<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Nasab</title>
    <link rel="icon" type="image/png" href="https://github.com/MerpatiQuu/Home/blob/main/log.png?raw=true">
    <script src="https://unpkg.com/gojs/release/go.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        #myDiagramDiv {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            background: white;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .search-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 10px auto;
        }

        .search-container h2 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }

        .search-container input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            flex: 1;
        }

        .search-container button {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #007bff;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 20px 25px;
            border-radius: 10px;
            box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 420px;
            text-align: left;
            max-height: 80vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 10px;
        }

        .button-group button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        .btn-save {
            background: #007bff;
        }

        .btn-delete {
            background: #dc3545;
        }

        .btn-spouse {
            background: #17b82a;
        }

        .btn-child {
            background: #f39c12;
        }

        .btn-close {
            background: none;
            border: none;
            color: #666;
            font-size: 20px;
            float: right;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="search-container">
        <h2>Bani Mushthofa</h2>
        <input type="text" id="nodeInput" list="nameSuggestions" placeholder="Cari nama..." oninput="filterNames()">
        <datalist id="nameSuggestions"></datalist>
        <button onclick="searchNode()"><i class="fas fa-search"></i></button>
        <button onclick="showAddRootForm()" style="background: #28a745;"><i class="fas fa-plus-circle"></i> Tambah
            Utama</button>
    </div>

    <div id="myDiagramDiv"></div>

    <!-- Modal Edit/Add -->
    <div id="modal" class="modal">
        <button class="btn-close" onclick="closeModal()">&times;</button>
        <h2 id="modalTitle">Edit Data</h2>

        <div id="editFields">
            <input type="hidden" id="editKey">
            <div class="form-group"><label>Nama:</label><input type="text" id="editName"></div>
            <div class="form-group"><label>Gender:</label><select id="editGender">
                    <option value="male">Laki-laki</option>
                    <option value="female">Perempuan</option>
                </select></div>
            <div class="form-group"><label>Pasangan (Key):</label><input type="text" id="editSpouse" readonly></div>
            <div class="form-group"><label>Orang Tua (Key):</label><input type="text" id="editParent" readonly></div>
            <div class="form-group"><label>Alamat:</label><input type="text" id="editAlamat"></div>
            <div class="form-group"><label>Telepon:</label><input type="text" id="editTel"></div>
            <div class="button-group">
                <button class="btn-save" onclick="saveEdit()"><i class="fa fa-save"></i> Simpan</button>
                <button class="btn-delete" onclick="removeNode()"><i class="fa fa-trash"></i> Hapus</button>
            </div>
            <div class="button-group" style="margin-top: 20px;">
                <button class="btn-spouse" onclick="showAddForm('Pasangan')"><i class="fa fa-user-plus"></i>
                    +Pasangan</button>
                <button class="btn-child" onclick="showAddForm('Anak')"><i class="fa fa-child"></i> +Anak</button>
            </div>
        </div>

        <div id="addFormExtra" style="display:none;">
            <h3 id="addTitle">Tambah Data Baru</h3>
            <div class="form-group"><label>Nama:</label><input type="text" id="addName" placeholder="Contoh: Ummi">
            </div>
            <div class="form-group"><label>Gender:</label><select id="addGender">
                    <option value="male">Laki-laki</option>
                    <option value="female">Perempuan</option>
                </select></div>
            <div class="form-group"><label>Alamat:</label><input type="text" id="addAlamat"
                    placeholder="Contoh: Patemon"></div>
            <div class="form-group"><label>Telepon:</label><input type="text" id="addTel" placeholder="+62..."></div>
            <div class="button-group">
                <button class="btn-save" style="width:100%" onclick="submitNewData()">Submit</button>
                <button onclick="hideAddForm()"
                    style="background:#666; color:white; border:none; border-radius:6px; padding:10px;">Batal</button>
            </div>
        </div>
    </div>

    <script>
        // API URL (Gunakan index.php secara langsung)
        var API_URL = "https://merpati.my.id/tay/api/index.php";

        var $ = go.GraphObject.make;
        var myDiagram = $(go.Diagram, "myDiagramDiv", {
            layout: $(go.TreeLayout, { angle: 90, layerSpacing: 40 })
        });

        var selectedNode = null;
        var currentAddType = "";

        // Node Template
        myDiagram.nodeTemplate = $(go.Node, "Auto",
            { doubleClick: (e, obj) => openModal(obj.part) },
            $(go.Shape, "RoundedRectangle", { fill: "white", strokeWidth: 2 },
                new go.Binding("stroke", "gender", g => g === "male" ? "#007bff" : "#dc3545")),
            $(go.TextBlock, { margin: 10, font: "bold 13px sans-serif" }, new go.Binding("text", "name"))
        );

        // Link Template
        myDiagram.linkTemplate = $(go.Link, { routing: go.Link.Orthogonal, corner: 10 }, $(go.Shape, { strokeWidth: 2, stroke: "#666" }));

        // Load Data
        function loadData() {
            fetch(API_URL + "/family")
                .then(res => res.json())
                .then(res => {
                    if (res.status === "success") {
                        myDiagram.model = new go.GraphLinksModel(res.data.nodes, res.data.links);
                    }
                }).catch(err => console.error("Fetch error:", err));
        }

        function openModal(node) {
            selectedNode = node;
            document.getElementById("modalTitle").innerText = "Edit Anggota";
            document.getElementById("editFields").style.display = "block";
            document.getElementById("addFormExtra").style.display = "none";

            document.getElementById("editKey").value = node.data.key;
            document.getElementById("editName").value = node.data.name;
            document.getElementById("editGender").value = node.data.gender;
            document.getElementById("editSpouse").value = node.data.spouse || "";
            document.getElementById("editParent").value = node.data.parent || "";
            document.getElementById("editAlamat").value = node.data.alamat || "";
            document.getElementById("editTel").value = node.data.tel || "";
            document.getElementById("modal").style.display = "block";
        }

        function closeModal() { document.getElementById("modal").style.display = "none"; }

        function showAddRootForm() {
            currentAddType = "Root";
            document.getElementById("modalTitle").innerText = "Tambah Anggota Utama";
            document.getElementById("editFields").style.display = "none";
            document.getElementById("addFormExtra").style.display = "block";
            document.getElementById("addName").value = "";
            document.getElementById("addAlamat").value = "";
            document.getElementById("addTel").value = "";
            document.getElementById("modal").style.display = "block";
        }

        function showAddForm(type) {
            currentAddType = type;
            document.getElementById("addTitle").innerText = "Tambah " + type + " untuk " + selectedNode.data.name;
            document.getElementById("editFields").style.display = "none";
            document.getElementById("addFormExtra").style.display = "block";
            document.getElementById("addName").value = "";
            document.getElementById("addAlamat").value = "";
            document.getElementById("addTel").value = "";
            if (type === "Pasangan") {
                document.getElementById("addGender").value = (selectedNode.data.gender === "male" ? "female" : "male");
            }
        }

        function hideAddForm() {
            if (selectedNode) {
                document.getElementById("editFields").style.display = "block";
                document.getElementById("addFormExtra").style.display = "none";
            } else {
                closeModal();
            }
        }

        function saveEdit() {
            const payload = {
                id: document.getElementById("editKey").value,
                name: document.getElementById("editName").value,
                gender: document.getElementById("editGender").value,
                alamat: document.getElementById("editAlamat").value,
                tel: document.getElementById("editTel").value
            };
            fetch(API_URL + "/person/update", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(() => { closeModal(); loadData(); });
        }

        function removeNode() {
            if (!confirm("Hapus data ini?")) return;
            fetch(API_URL + "/person/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: selectedNode.data.key })
            }).then(() => { closeModal(); loadData(); });
        }

        function submitNewData() {
            const payload = {
                name: document.getElementById("addName").value,
                gender: document.getElementById("addGender").value,
                alamat: document.getElementById("addAlamat").value,
                tel: document.getElementById("addTel").value
            };
            if (currentAddType === "Pasangan" && selectedNode) payload.spouse = selectedNode.data.key;
            if (currentAddType === "Anak" && selectedNode) payload.parent = selectedNode.data.key;

            fetch(API_URL + "/person", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(res => res.json())
                .then(res => {
                    if (res.status === "success") {
                        closeModal();
                        loadData();
                    } else {
                        alert("Gagal: " + res.message);
                    }
                });
        }

        loadData();

        function filterNames() {
            var input = document.getElementById("nodeInput").value.toLowerCase();
            var datalist = document.getElementById("nameSuggestions");
            datalist.innerHTML = "";
            myDiagram.nodes.each(node => {
                if (node.data.name && node.data.name.toLowerCase().includes(input)) {
                    var option = document.createElement("option");
                    option.value = node.data.name;
                    datalist.appendChild(option);
                }
            });
        }

        function searchNode() {
            var nodeName = document.getElementById("nodeInput").value;
            var found = null;
            myDiagram.nodes.each(node => {
                if (node.data.name === nodeName) found = node;
            });
            if (found) {
                myDiagram.select(found);
                myDiagram.scrollToPart(found);
            }
        }
    </script>
</body>

</html>
