<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Nasab</title>
    <link rel="icon" type="image/png" href="https://github.com/MerpatiQuu/Home/blob/main/log.png?raw=true">
    <script src="https://unpkg.com/gojs/release/go.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        #myDiagramDiv {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            background: white;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .search-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 10px auto;
        }

        .search-container h2 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }

        .search-container input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            flex: 1;
        }

        .search-container button {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #007bff;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 450px;
            text-align: left;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal h2,
        .modal h3 {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            color: #333;
            font-size: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #007bff;
        }

        .form-group input:disabled {
            background-color: #e9ecef;
            color: #495057;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 15px;
        }

        .button-group button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-weight: 600;
            font-size: 14px;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .button-group button:hover {
            opacity: 0.9;
        }

        .button-group button:active {
            transform: scale(0.98);
        }

        .btn-save {
            background: #007bff;
        }

        .btn-delete {
            background: #dc3545;
        }

        .btn-spouse {
            background: #17b82a;
        }

        .btn-child {
            background: #f39c12;
        }

        .btn-cancel {
            background: #6c757d;
        }

        .btn-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #999;
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }

        .btn-close:hover {
            color: #333;
        }

        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .form-group.full-width {
                grid-column: span 1;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="search-container">
        <h2>Bani Mushthofa</h2>
        <input type="text" id="nodeInput" list="nameSuggestions" placeholder="Cari nama..." oninput="filterNames()">
        <datalist id="nameSuggestions"></datalist>
        <button onclick="searchNode()"><i class="fas fa-search"></i></button>
        <button onclick="showAddRootForm()" style="background: #28a745;"><i class="fas fa-plus-circle"></i></button>
    </div>

    <div id="myDiagramDiv"></div>

    <!-- Modal Edit/Add -->
    <div id="modal" class="modal">
        <button class="btn-close" onclick="closeModal()">&times;</button>

        <div id="editFields">
            <h2 id="modalTitle">Edit Data</h2>
            <input type="hidden" id="editKey">
            <div class="form-grid">
                <div class="form-group full-width"><label>Nama:</label><input type="text" id="editName"></div>
                <div class="form-group"><label>Gender:</label><select id="editGender">
                        <option value="male">Laki-laki</option>
                        <option value="female">Perempuan</option>
                    </select></div>
                <div class="form-group"><label>Telepon:</label><input type="text" id="editTel" placeholder="+62...">
                </div>
                <div class="form-group full-width"><label>Alamat:</label><input type="text" id="editAlamat"></div>

                <div class="form-group"><label>Pasangan:</label><input type="text" id="editSpouseName" disabled></div>
                <div class="form-group"><label>Orang Tua:</label><input type="text" id="editParentName" disabled></div>
            </div>

            <div class="button-group">
                <button class="btn-save" onclick="saveEdit()"><i class="fa fa-save"></i> Simpan</button>
                <button class="btn-delete" onclick="removeNode()"><i class="fa fa-trash"></i> Hapus</button>
            </div>
            <div class="button-group" style="margin-top: 10px;">
                <button class="btn-spouse" onclick="showAddForm('Pasangan')"><i class="fa fa-user-plus"></i>
                    +Pasangan</button>
                <button class="btn-child" onclick="showAddForm('Anak')"><i class="fa fa-child"></i> +Anak</button>
            </div>
        </div>

        <div id="addFormExtra" style="display:none;">
            <h3 id="addTitle">Tambah Data Baru</h3>
            <div class="form-grid">
                <div class="form-group full-width"><label>Nama:</label><input type="text" id="addName"
                        placeholder="Contoh: Ummi"></div>
                <div class="form-group"><label>Gender:</label><select id="addGender">
                        <option value="male">Laki-laki</option>
                        <option value="female">Perempuan</option>
                    </select></div>
                <div class="form-group"><label>Telepon:</label><input type="text" id="addTel" placeholder="+62...">
                </div>
                <div class="form-group full-width"><label>Alamat:</label><input type="text" id="addAlamat"
                        placeholder="Contoh: Patemon"></div>
            </div>
            <div class="button-group">
                <button class="btn-save" onclick="submitNewData()"><i class="fa fa-save"></i> Submit</button>
                <button class="btn-cancel" onclick="hideAddForm()"><i class="fa fa-times"></i> Batal</button>
            </div>
        </div>
    </div>

    <script>
        // API URL (Gunakan index.php secara langsung)
        var API_URL = "https://merpati.my.id/tay/api/index.php";

        var $ = go.GraphObject.make;
        var myDiagram = $(go.Diagram, "myDiagramDiv", {
            "undoManager.isEnabled": true,
            layout: $(go.TreeLayout, {
                angle: 0,
                layerSpacing: 30,
                nodeSpacing: 5,
                alignment: go.TreeLayout.AlignmentCenter,
                sorting: go.TreeLayout.SortingAscending
            })
        });

        var selectedNode = null;
        var currentAddType = "";

        // Fungsi sorotan (Highlighting node terhubung)
        function focusConnectedNodes(selectedNode) {
            myDiagram.startTransaction("highlight");
            myDiagram.nodes.each(n => n.visible = false);
            myDiagram.links.each(l => l.visible = false);

            function showConnected(node) {
                if (!node || node.visible) return;
                node.visible = true;
                node.findNodesOutOf().each(child => showConnected(child));
                node.findNodesConnected().each(connectedNode => connectedNode.visible = true);
                node.findLinksConnected().each(link => link.visible = true);
            }
            showConnected(selectedNode);
            myDiagram.commitTransaction("highlight");
        }

        // Reset tampilan jika klik background
        myDiagram.addDiagramListener("BackgroundSingleClicked", function () {
            myDiagram.startTransaction("reset");
            myDiagram.nodes.each(n => n.visible = true);
            myDiagram.links.each(l => l.visible = true);
            myDiagram.commitTransaction("reset");
        });

        // Node Template (Sesuai kode awal)
        myDiagram.nodeTemplate = $(go.Node, "Auto",
            {
                click: function (e, obj) {
                    var node = obj.part;
                    if (node !== null) {
                        focusConnectedNodes(node);
                    }
                },
                doubleClick: (e, obj) => openModal(obj.part)
            },
            $(go.Shape, "RoundedRectangle", {
                width: 100, height: 40, strokeWidth: 2, fill: "white",
            },
                new go.Binding("stroke", "gender", function (g) {
                    return g === "male" ? "gold" : "red";
                })
            ),
            $(go.TextBlock, {
                margin: 0,
                maxSize: new go.Size(90, NaN),
                wrap: go.TextBlock.WrapFit,
                overflow: go.TextBlock.OverflowEllipsis,
                font: "bold 10px sans-serif",
                textAlign: "center"
            },
                new go.Binding("text", "name")
            )
        );

        // Link Template Default (Anak) dengan 🪢
        myDiagram.linkTemplate = $(go.Link,
            { routing: go.Link.AvoidsNodes, curve: go.Link.JumpOver },
            $(go.Shape),
            $(go.Shape, { toArrow: "Standard" }),
            $(go.Panel, "Auto",
                {
                    segmentFraction: 0.5,
                    segmentOrientation: function (link) {
                        return link.actualBounds.width > link.actualBounds.height
                            ? go.Link.OrientUpright
                            : go.Link.OrientSideways;
                    }
                },
                $(go.TextBlock, "🪢", { font: "bold 10px sans-serif", stroke: "black" })
            )
        );

        // Link Template Khusus (Pasangan) dengan ❤️
        myDiagram.linkTemplateMap.add("Spouse",
            $(go.Link,
                { routing: go.Link.Orthogonal, selectable: false }, // Garis tidak bisa dipilih
                $(go.Shape, { stroke: "green", strokeWidth: 2 }), // Garis hijau
                $(go.TextBlock, "❤️",  // Ikon pernikahan
                    {
                        segmentFraction: 0.5, // Posisikan ikon di tengah garis
                        font: "10px Arial",
                        stroke: "red",

                        // Gunakan logika untuk orientasi tergantung pada panjang link
                        segmentOrientation: function (link) {
                            if (link.actualBounds.width > link.actualBounds.height) {
                                return go.Link.OrientUpright; // Orientasi tegak untuk garis horizontal
                            } else {
                                return go.Link.OrientSideways; // Orientasi datar untuk garis vertikal
                            }
                        }
                    }
                )
            )
        );

        // Load Data
        function loadData() {
            fetch(API_URL + "/family")
                .then(res => res.json())
                .then(res => {
                    if (res.status === "success") {
                        // Kategori 'Spouse' ditentukan di backend atau frontend
                        // Pastikan frontend juga mengenali kategori dari key pasangannya
                        res.data.links.forEach(link => {
                            // Cek jika ini adalah hubungan pasangan yang ditentukan dari data
                            if (!link.category && res.data.nodes.find(n => n.key === link.from && n.spouse == link.to)) {
                                link.category = "Spouse";
                            }
                        });
                        myDiagram.model = new go.GraphLinksModel(res.data.nodes, res.data.links);
                    }
                }).catch(err => console.error("Fetch error:", err));
        }

        function openModal(node) {
            selectedNode = node;
            document.getElementById("modalTitle").innerText = "Edit Anggota";
            document.getElementById("editFields").style.display = "block";
            document.getElementById("addFormExtra").style.display = "none";

            document.getElementById("editKey").value = node.data.key;
            document.getElementById("editName").value = node.data.name;
            document.getElementById("editGender").value = node.data.gender;
            document.getElementById("editAlamat").value = node.data.alamat || "";
            document.getElementById("editTel").value = node.data.tel || "";

            // Mapping nama Pasangan dan Orang Tua (Berdasarkan ID di Model GoJS)
            let spouseName = "-";
            if (node.data.spouse) {
                let sNode = myDiagram.model.findNodeDataForKey(node.data.spouse);
                if (sNode) spouseName = sNode.name;
            }

            let parentName = "-";
            if (node.data.parent) {
                let pNode = myDiagram.model.findNodeDataForKey(node.data.parent);
                if (pNode) parentName = pNode.name;
            }

            document.getElementById("editSpouseName").value = spouseName;
            document.getElementById("editParentName").value = parentName;

            document.getElementById("modal").style.display = "block";
        }

        function closeModal() { document.getElementById("modal").style.display = "none"; }

        function showAddRootForm() {
            currentAddType = "Root";
            document.getElementById("modalTitle").innerText = "Tambah Anggota Utama";
            document.getElementById("editFields").style.display = "none";
            document.getElementById("addFormExtra").style.display = "block";
            document.getElementById("addName").value = "";
            document.getElementById("addAlamat").value = "";
            document.getElementById("addTel").value = "";
            document.getElementById("modal").style.display = "block";
        }

        function showAddForm(type) {
            currentAddType = type;
            document.getElementById("addTitle").innerText = "Tambah " + type + " untuk " + selectedNode.data.name;
            document.getElementById("editFields").style.display = "none";
            document.getElementById("addFormExtra").style.display = "block";
            document.getElementById("addName").value = "";
            document.getElementById("addAlamat").value = "";
            document.getElementById("addTel").value = "";
            if (type === "Pasangan") {
                document.getElementById("addGender").value = (selectedNode.data.gender === "male" ? "female" : "male");
            }
        }

        function hideAddForm() {
            if (selectedNode) {
                document.getElementById("editFields").style.display = "block";
                document.getElementById("addFormExtra").style.display = "none";
            } else {
                closeModal();
            }
        }

        function saveEdit() {
            const payload = {
                id: document.getElementById("editKey").value,
                name: document.getElementById("editName").value,
                gender: document.getElementById("editGender").value,
                alamat: document.getElementById("editAlamat").value,
                tel: document.getElementById("editTel").value
            };
            fetch(API_URL + "/person/update", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(() => { closeModal(); loadData(); });
        }

        function removeNode() {
            if (!confirm("Hapus data ini?")) return;
            fetch(API_URL + "/person/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: selectedNode.data.key })
            }).then(() => { closeModal(); loadData(); });
        }

        function submitNewData() {
            const payload = {
                name: document.getElementById("addName").value,
                gender: document.getElementById("addGender").value,
                alamat: document.getElementById("addAlamat").value,
                tel: document.getElementById("addTel").value
            };
            if (currentAddType === "Pasangan" && selectedNode) payload.spouse = selectedNode.data.key;
            if (currentAddType === "Anak" && selectedNode) payload.parent = selectedNode.data.key;

            fetch(API_URL + "/person", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(res => res.json())
                .then(res => {
                    if (res.status === "success") {
                        closeModal();
                        loadData();
                    } else {
                        alert("Gagal: " + res.message);
                    }
                });
        }

        loadData();

        function filterNames() {
            var input = document.getElementById("nodeInput").value.toLowerCase();
            var datalist = document.getElementById("nameSuggestions");
            datalist.innerHTML = "";
            myDiagram.nodes.each(node => {
                if (node.data.name && node.data.name.toLowerCase().includes(input)) {
                    var option = document.createElement("option");
                    option.value = node.data.name;
                    datalist.appendChild(option);
                }
            });
        }

        function searchNode() {
            var nodeName = document.getElementById("nodeInput").value.trim();
            if (nodeName) {
                var found = null;
                myDiagram.nodes.each(node => {
                    if (node.data.name && node.data.name.toLowerCase() === nodeName.toLowerCase()) {
                        found = node;
                    }
                });

                if (found) {
                    focusConnectedNodes(found);
                    myDiagram.select(found);
                    myDiagram.scrollToPart(found);
                } else {
                    alert("Node dengan nama '" + nodeName + "' tidak ditemukan.");
                }
            } else {
                alert("Masukkan nama node terlebih dahulu.");
            }
        }
    </script>
</body>

</html>
