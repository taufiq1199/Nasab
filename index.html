<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Nasab</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://github.com/MerpatiQuu/Home/blob/main/log.png?raw=true">

    <!-- Open Graph Meta Tags (Untuk pratinjau saat dibagikan) -->
    <meta property="og:title" content="Pohon Nasab">
    <meta property="og:description" content="Silaturrahmi menumbuhkan rezeki.">
    <meta property="og:image" content="https://github.com/MerpatiQuu/Home/blob/main/log.png?raw=true">
    <meta property="og:url" content="https://github.com/MerpatiQuu/Home/blob/main/log.png?raw=true">
    <meta property="og:type" content="website">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="https://github.com/MerpatiQuu/Home/blob/main/log.png?raw=true">
    <meta name="twitter:title" content="Pohon Nasab">
    <meta name="twitter:description" content="Silaturrahmi menumbuhkan rezeki.">
    <meta name="twitter:image" content="https://github.com/MerpatiQuu/Home/blob/main/log.png?raw=true">

    <!-- Font Awesome & GoJS -->
    <script src="https://unpkg.com/gojs/release/go.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* ==== Global Styles ==== */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        /* ==== Diagram Styling ==== */
        #myDiagramDiv {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            background: white;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            position: start;
            top: -10px;
        }

        .search-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: auto;
        }

        .search-container h2 {
            font-size: 20px;
            color: #333;
            margin: 0;
        }

        .search-container input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            margin: 0 10px;
            outline: none;
            transition: all 0.3s ease-in-out;
        }

        .search-container input[type="text"]:focus {
            border-color: #007bff;
            box-shadow: 0px 0px 5px rgba(0, 123, 255, 0.5);
        }

        .search-container button {
            background: white;
            color: #007bff;
            border: 2px solid #007bff;
            /* Tambahkan border biru */
            padding: 5px 5px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-container button i {
            font-size: 18px;
            color: #007bff;
            /* Warna ikon biru */
        }

        .search-container button:hover {
            background: #007bff;
            border-color: #007bff;
            /* Pastikan border tetap biru */
        }

        .search-container button:hover i {
            color: white;
            /* Ubah ikon menjadi putih saat hover */
        }

        /* ==== Modal Styling ==== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 20px 25px;
            border-radius: 10px;
            box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 420px;
            text-align: left;
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;

            /* Tambahan untuk scroll */
            max-height: 80vh;
            /* Modal tidak melebihi 80% tinggi layar */
            overflow-y: auto;
            /* Aktifkan scroll jika konten melebihi modal */
        }

        /* Modal Tampil */
        .modal.show {
            display: block;
            opacity: 1;
        }

        /* Judul Modal */
        .modal h2 {
            margin: 0 0 15px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        /* ==== Close Button ==== */
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 18px;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: bold;
            color: #666;
            transition: color 0.2s ease-in-out;
        }

        .close-btn:hover {
            color: #ff3b3b;
        }

        /* ==== Form Styling ==== */
        .form-group {
            width: 100%;
            margin-bottom: 10px;
            padding: 0 5px;
            /* Beri jarak antara input dan batas modal */
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            margin-bottom: 5px;
        }

        /* Input & Select */
        .form-group input,
        .form-group select {
            width: 100%;
            /* Gunakan 100% dari form-group */
            max-width: 350px;
            /* Batasi lebar maksimal */
            height: 38px;
            /* Sedikit lebih kecil agar lebih proporsional */
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            appearance: none;
            /* Menghilangkan default style dari select */
            -webkit-appearance: none;
            -moz-appearance: none;
            box-sizing: border-box;
        }

        /* Fokus pada Input */
        .form-group input:focus,
        .form-group select:focus {
            border-color: #007bff;
            box-shadow: 0 0 6px rgba(0, 123, 255, 0.2);
            background: white;
            outline: none;
        }

        /* Select dengan Ikon Dropdown */
        .form-group select {
            background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="gray"><path d="M7 10l5 5 5-5z"></path></svg>') no-repeat right 10px center;
            background-size: 16px;
            padding-right: 30px;
            /* Beri ruang untuk ikon */
        }

        /* ==== Button Group Styling ==== */
        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
        }

        /* Tombol */
        .button-group button {
            flex: 1;
            height: 38px;
            /* Ukuran lebih kecil agar proporsional */
            border: none;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
        }

        /* Hover Effect */
        .button-group button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Warna Tombol */
        .button-group button:nth-child(1) {
            background-color: #007bff;
            color: white;
        }

        /* Simpan */
        .button-group button:nth-child(2) {
            background-color: #dc3545;
            color: white;
        }

        /* Hapus */
        .button-group button:nth-child(3) {
            background-color: #17b82a;
            color: white;
        }

        /* Pasangan */
        .button-group button:nth-child(4) {
            background-color: #f39c12;
            color: white;
        }

        /* Anak */
        #formContainer {
            display: none;
            /* Initially hidden */
        }

        .form-container {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #f9f9f9;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
        }

        .add-group {
            margin-bottom: 10px;
        }

        /* ==== Responsiveness ==== */
        @media (max-width: 400px) {
            .modal {
                width: 95%;
                padding: 18px;
            }

            .form-group input,
            .form-group select,
            .button-group button,
            .add-buttons button {
                height: 36px;
                /* Lebih kecil di layar kecil */
            }

            .button-group,
            .add-buttons {
                flex-direction: column;
            }

            .search-container {
                flex-direction: column;
                text-align: center;
                padding: 10px;
            }

            .search-container input[type="text"] {
                width: 100%;
                margin: 10px 0;
            }

            .search-container button {
                width: 100%;
            }
        }

        /* ==== Hidden Class ==== */
        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="search-container">
        <h2>Bani Mushthofa</h2>
        <input type="text" id="nodeInput" list="nameSuggestions" placeholder="Cari nama..." oninput="filterNames()">
        <datalist id="nameSuggestions"></datalist>
        <button onclick="searchNode()">
            <i class="fas fa-search"></i>
        </button>
    </div>
    <div id="myDiagramDiv"></div>
    <div id="modal" class="modal">
        <button class="close-btn" onclick="closeModal()">X</button>
        <h2>Edit Data</h2>
        <div class="form-group">
            <label for="editKey">Key:</label>
            <input type="text" id="editKey">
        </div>
        <div class="form-group">
            <label for="editName">Nama:</label>
            <input type="text" id="editName">
        </div>
        <div class="form-group">
            <label for="editGender">Gender:</label>
            <select id="editGender">
                <option value="">-</option>
                <option value="male">Laki-laki</option>
                <option value="female">Perempuan</option>
            </select>
        </div>
        <div class="form-group">
            <label for="editSpouse">Pasangan:</label>
            <input type="text" id="editSpouse" readonly>
        </div>
        <div class="form-group">
            <label for="editParent">Orang Tua:</label>
            <input type="text" id="editParent" readonly>
        </div>
        <div class="form-group">
            <label for="editAlamat">Alamat:</label>
            <input type="text" id="editAlamat">
        </div>
        <div class="form-group">
            <label for="editTel">Telepon:</label>
            <input type="text" id="editTel" placeholder="+62...">
        </div>
        <div class="button-group">
            <button onclick="saveEdit()"><i class="fa fa-save"></i></button>
            <button onclick="removeNode()"><i class="fa fa-trash"></i></button>
            <button onclick="showForm('Pasangan')"><i class="fa fa-user-plus"></i></button>
            <button onclick="showForm('Anak')"><i class="fa fa-child"></i></button>
        </div>

        <!-- Form Container dengan ID unik -->
        <div id="addFormContainer" style="display: none; margin-top: 20px; padding: 15px; border-top: 1px solid #ccc;">
            <h3 id="formTitle">Tambah Data</h3>

            <div class="form-group">
                <label for="addName">Nama:</label>
                <input type="text" id="addName" required>
            </div>

            <div class="form-group">
                <label for="addGender">Gender:</label>
                <select id="addGender" required>
                    <option value="">-</option>
                    <option value="male">Laki-laki</option>
                    <option value="female">Perempuan</option>
                </select>
            </div>

            <div class="form-group">
                <label for="addSpouse">Pasangan (Key):</label>
                <input type="text" id="addSpouse" readonly>
            </div>

            <div class="form-group">
                <label for="addParent">Orang Tua (Key):</label>
                <input type="text" id="addParent" readonly>
            </div>

            <div class="form-group">
                <label for="addAlamat">Alamat:</label>
                <input type="text" id="addAlamat">
            </div>

            <div class="form-group">
                <label for="addTel">Telepon:</label>
                <input type="text" id="addTel" placeholder="+62...">
            </div>

            <div class="button-group">
                <button onclick="submitNewData()" style="background-color: #007bff; color: white;">
                    <i class="fa fa-save"></i> Submit
                </button>
                <button onclick="hideAddForm()" style="background-color: #dc3545; color: white;">
                    <i class="fa fa-times"></i> Cancel
                </button>
            </div>
        </div>
    </div>
    </form>

    <script>

        var API_URL = "https://toko.merpati.my.id/tay/api";

        var $ = go.GraphObject.make;

        var myDiagram = $(go.Diagram, "myDiagramDiv", {
            "undoManager.isEnabled": true,
            layout: $(go.TreeLayout, {
                angle: 0,
                layerSpacing: 30,
                nodeSpacing: 5,
                alignment: go.TreeLayout.AlignmentCenter,
                sorting: go.TreeLayout.SortingAscending
            })
        });

        var selectedNode = null;
        let formType = "";

        // ============================================
        // FUNGSI SHOW FORM
        // ============================================
        function showForm(type) {
            console.log("showForm:", type);
            formType = type;

            // Tampilkan dan setup addFormContainer
            document.getElementById("formTitle").innerText = "Tambah " + type;
            document.getElementById("addFormContainer").style.display = "block";

            // Reset semua field
            document.getElementById("addName").value = "";
            document.getElementById("addGender").value = "";
            document.getElementById("addAlamat").value = "";
            document.getElementById("addTel").value = "";
            document.getElementById("addSpouse").value = "";
            document.getElementById("addParent").value = "";

            if (type === "Pasangan" && selectedNode) {
                var nodeGender = selectedNode.data.gender;
                var spouseGender = nodeGender === "male" ? "female" : "male";

                document.getElementById("addGender").value = spouseGender;
                document.getElementById("addSpouse").value = selectedNode.data.key;
                document.getElementById("addParent").value = "";
            }

            if (type === "Anak" && selectedNode) {
                document.getElementById("addParent").value = selectedNode.data.key;
                document.getElementById("addSpouse").value = "";
                document.getElementById("addGender").value = "";
            }
        }

        // ============================================
        // FUNGSI SUBMIT DATA BARU
        // ============================================
        function submitNewData() {
            var name = document.getElementById("addName").value;
            var gender = document.getElementById("addGender").value;
            var alamat = document.getElementById("addAlamat").value;
            var tel = document.getElementById("addTel").value;
            var spouse = document.getElementById("addSpouse").value;
            var parent = document.getElementById("addParent").value;

            if (!name || !gender) {
                alert("Nama dan Gender harus diisi!");
                return;
            }

            var postData = {
                name: name,
                gender: gender,
                alamat: alamat,
                tel: tel
            };

            // Hanya tambahkan spouse/parent jika ada nilainya
            if (spouse) postData.spouse = spouse;
            if (parent) postData.parent = parent;

            fetch(API_URL + "/person", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(postData)
            })
                .then(res => res.json())
                .then(res => {
                    if (res.status === "success") {
                        alert("Data berhasil ditambahkan");
                        hideAddForm();
                        location.reload();
                    } else {
                        alert("Gagal: " + res.message);
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("Gagal menambahkan data");
                    location.reload();
                });
        }

        // ============================================
        // FUNGSI HIDE ADD FORM
        // ============================================
        function hideAddForm() {
            document.getElementById("addFormContainer").style.display = "none";
        }

        // ============================================
        // NODE TEMPLATE
        // ============================================
        myDiagram.nodeTemplate = $(go.Node, "Auto",
            {
                click: function (e, obj) {
                    var node = obj.part;
                    if (node !== null) {
                        focusConnectedNodes(node);
                    }
                },

                doubleClick: function (e, obj) {
                    var node = obj.part;
                    if (node !== null) {
                        // Gunakan ID yang benar untuk edit form
                        document.getElementById("editKey").value = node.data.key || "";
                        document.getElementById("editName").value = node.data.name || "";
                        document.getElementById("editGender").value = node.data.gender || "";
                        document.getElementById("editSpouse").value = node.data.spouse || "";
                        document.getElementById("editParent").value = node.data.parent || "";
                        document.getElementById("editAlamat").value = node.data.alamat || "";
                        document.getElementById("editTel").value = node.data.tel || "";

                        document.getElementById("modal").style.display = "block";
                        document.getElementById("addFormContainer").style.display = "none"; // Sembunyikan form tambah

                        selectedNode = node;
                    }
                }
            },

            $(go.Shape, "RoundedRectangle",
                {
                    width: 100,
                    height: 40,
                    strokeWidth: 2,
                    fill: "white"
                },
                new go.Binding("stroke", "gender", function (g) {
                    return g === "male" ? "gold" : "red";
                })
            ),

            $(go.TextBlock,
                {
                    margin: 0,
                    maxSize: new go.Size(90, NaN),
                    wrap: go.TextBlock.WrapFit,
                    overflow: go.TextBlock.OverflowEllipsis,
                    font: "bold 10px sans-serif",
                    textAlign: "center"
                },
                new go.Binding("text", "name")
            )
        );

        // ============================================
        // LINK TEMPLATE
        // ============================================
        myDiagram.linkTemplate =
            $(go.Link,
                { routing: go.Link.AvoidsNodes, curve: go.Link.JumpOver },
                $(go.Shape),
                $(go.Shape, { toArrow: "Standard" }),

                $(go.Panel, "Auto",
                    {
                        segmentFraction: 0.5
                    },
                    $(go.TextBlock, "🪢",
                        { font: "bold 10px sans-serif", stroke: "black" }
                    )
                )
            );

        // ============================================
        // FUNGSI FILTER NAMA
        // ============================================
        function filterNames() {
            var input = document.getElementById("nodeInput").value.toLowerCase();
            var datalist = document.getElementById("nameSuggestions");

            datalist.innerHTML = "";

            myDiagram.nodes.each(node => {
                var nodeName = node.data.name;
                if (nodeName && nodeName.toLowerCase().includes(input)) {
                    var option = document.createElement("option");
                    option.value = nodeName;
                    datalist.appendChild(option);
                }
            });
        }

        // ============================================
        // FUNGSI SEARCH NODE
        // ============================================
        function searchNode() {
            var nodeName = document.getElementById("nodeInput").value.trim();

            if (nodeName) {
                var found = null;
                myDiagram.nodes.each(node => {
                    if (node.data.name && node.data.name.toLowerCase() === nodeName.toLowerCase()) {
                        found = node;
                    }
                });

                if (found) {
                    focusConnectedNodes(found);
                } else {
                    alert("Node tidak ditemukan");
                }
            } else {
                alert("Masukkan nama");
            }
        }

        // ============================================
        // FUNGSI FOCUS CONNECTED NODES
        // ============================================
        function focusConnectedNodes(selectedNode) {
            myDiagram.startTransaction("highlight");

            myDiagram.nodes.each(n => n.visible = false);
            myDiagram.links.each(l => l.visible = false);

            function showConnected(node) {
                if (!node || node.visible) return;

                node.visible = true;

                node.findNodesOutOf().each(child => {
                    showConnected(child);
                });

                node.findNodesConnected().each(n => {
                    n.visible = true;
                });

                node.findLinksConnected().each(l => {
                    l.visible = true;
                });
            }

            showConnected(selectedNode);
            myDiagram.commitTransaction("highlight");
        }

        // ============================================
        // BACKGROUND CLICK - RESET VIEW
        // ============================================
        myDiagram.addDiagramListener("BackgroundSingleClicked", function () {
            myDiagram.startTransaction("reset");
            myDiagram.nodes.each(n => n.visible = true);
            myDiagram.links.each(l => l.visible = true);
            myDiagram.commitTransaction("reset");
        });

        // ============================================
        // FUNGSI SAVE EDIT
        // ============================================
        function saveEdit() {
            if (!selectedNode) return;

            var key = document.getElementById("editKey").value;
            var name = document.getElementById("editName").value;
            var gender = document.getElementById("editGender").value;
            var spouse = document.getElementById("editSpouse").value;
            var parent = document.getElementById("editParent").value;
            var alamat = document.getElementById("editAlamat").value;
            var tel = document.getElementById("editTel").value;

            if (!name || !gender) {
                alert("Nama dan Gender harus diisi!");
                return;
            }

            myDiagram.model.startTransaction("Edit");
            myDiagram.model.setDataProperty(selectedNode.data, "name", name);
            myDiagram.model.setDataProperty(selectedNode.data, "gender", gender);
            myDiagram.model.setDataProperty(selectedNode.data, "alamat", alamat);
            myDiagram.model.setDataProperty(selectedNode.data, "tel", tel);
            myDiagram.model.setDataProperty(selectedNode.data, "spouse", spouse);
            myDiagram.model.setDataProperty(selectedNode.data, "parent", parent);
            myDiagram.model.commitTransaction("Edit");

            var postData = {
                key: key,
                name: name,
                gender: gender,
                alamat: alamat,
                tel: tel
            };

            if (spouse) postData.spouse = spouse;
            if (parent) postData.parent = parent;

            fetch(API_URL + "/person/update", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(postData)
            })
                .then(res => res.json())
                .then(res => {
                    console.log(res);
                    if (res.status === "success") {
                        closeModal();
                        location.reload();
                    } else {
                        alert("Gagal: " + res.message);
                    }
                })
                .catch(err => {
                    console.error(err);
                    location.reload();
                });
        }

        // ============================================
        // FUNGSI REMOVE NODE
        // ============================================
        function removeNode() {
            if (!selectedNode) return;

            if (!confirm("Yakin ingin menghapus data ini?")) return;

            var key = selectedNode.data.key;

            fetch(API_URL + "/person/delete", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    key: key
                })
            })
                .then(res => res.json())
                .then(res => {
                    console.log(res);
                    if (res.status === "success") {
                        closeModal();
                        location.reload();
                    } else {
                        alert("Gagal: " + res.message);
                    }
                })
                .catch(err => {
                    console.error(err);
                    location.reload();
                });
        }

        // ============================================
        // FUNGSI CLOSE MODAL
        // ============================================
        function closeModal() {
            document.getElementById("modal").style.display = "none";
            document.getElementById("addFormContainer").style.display = "none";
        }

        // ============================================
        // LOAD DATA DARI API
        // ============================================
        fetch(API_URL + "/family")
            .then(res => res.json())
            .then(res => {
                console.log("API:", res);

                if (res.status !== "success") {
                    throw new Error(res.message);
                }

                var data = res.data;

                if (!data.nodes || !data.links) {
                    throw new Error("Format data salah");
                }

                // Proses links untuk GoJS
                data.links.forEach(link => {
                    if (link.category === "Spouse") {
                        let temp = link.from;
                        link.from = link.to;
                        link.to = temp;
                    }
                    delete link.key;
                });

                myDiagram.model = new go.GraphLinksModel(data.nodes, data.links);
            })
            .catch(err => {
                console.error(err);
                alert("Gagal mengambil data: " + err.message);
            });

        // ============================================
        // TEMPLATE LINK SPOUSE
        // ============================================
        myDiagram.linkTemplateMap.add("Spouse",
            $(go.Link,
                { routing: go.Link.Orthogonal, selectable: false },
                $(go.Shape, { stroke: "green", strokeWidth: 2 }),
                $(go.TextBlock, "❤️",
                    {
                        segmentFraction: 0.5,
                        font: "10px Arial",
                        stroke: "red"
                    }
                )
            )
        );

    </script>
</body>
